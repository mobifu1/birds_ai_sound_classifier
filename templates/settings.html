<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einstellungen</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #4CAF50; }
        .container { max-width: 1000px; margin: 20px auto; background: #2c2c2c; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .row { margin-bottom: 15px; }
        .section { background: #333; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .section h2 { color: #4CAF50; margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .meter-container { width: 100%; background: #111; height: 20px; border-radius: 10px; overflow: hidden; margin-top: 15px; border: 1px solid #444; }
        .meter-bar { height: 100%; width: 0%; background-color: #4CAF50; transition: width 0.2s ease, background-color 0.2s ease; }
        label { display: block; margin-bottom: 5px; color: #ccc; }
        input[type="number"], input[type="text"] { width: 100%; padding: 10px; border: 1px solid #444; border-radius: 5px; background: #1a1a1a; color: #fff; box-sizing: border-box; }
        .btn { display: inline-block; padding: 10px 20px; background: #4CAF50; color: #fff; text-decoration: none; border-radius: 5px; border: none; cursor: pointer; width: 100%; font-size: 1.1rem; text-align: center; }
        .btn:hover { background: #45a049; }
        .btn-gray { background: #555; width: auto; font-size: 0.9rem; margin-bottom: 20px; }
        .btn-gray:hover { background: #666; }
        .btn-red { background: #F44336; width: auto; font-size: 0.9rem; }
        .btn-red:hover { background: #d32f2f; }
        .btn-orange { background: #FF9800; width: auto; font-size: 0.9rem; }
        .btn-orange:hover { background: #f57c00; }
        .btn-blue { background: #2196F3; width: auto; font-size: 0.9rem; }
        .btn-blue:hover { background: #1976d2; }
        .btn-green { background: #4CAF50; width: auto; font-size: 0.9rem; }
        .btn-green:hover { background: #388E3C; }
        .control-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <a href="/" class="btn btn-gray">&laquo; Zurück zum Dashboard</a>
        <h1>⚙️ Einstellungen</h1>

        <div style="display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px;">
            <!-- System Status -->
            <div class="card" style="background: #333; padding: 20px; border-radius: 10px; flex: 1 1 250px;">
                <h2 style="margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #4CAF50; padding-bottom: 10px; color:#4CAF50;">System Status</h2>
                <p>Status: <span id="sys-status" style="color: #4CAF50;">Lade...</span></p>
                <p>Erkennungen Heute: <span id="today-count" style="font-weight: bold; color: #4CAF50;">0</span></p>
                <p>Erkennungen Gesamt: <span id="total-count">0</span></p>
                
                <div style="margin-top: 20px;">
                    <label style="font-size: 0.9rem; color: #ccc;">Live Audio Pegel:</label>
                    <div class="meter-container">
                        <div id="audio-meter" class="meter-bar"></div>
                    </div>
                </div>
            </div>

            <!-- Live Log -->
            <div class="card" style="background: #333; padding: 20px; border-radius: 10px; flex: 1 1 250px;">
                <h2 style="margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #4CAF50; padding-bottom: 10px; color:#4CAF50;">Live Log</h2>
                <div class="log-box" id="log-box" style="background: #000; color: #0f0; font-family: monospace; padding: 10px; height: 160px; overflow-y: auto; font-size: 0.9rem; border-radius: 5px;"></div>
            </div>
        </div>

        <div class="section">
            <h2>Hardware</h2>
            <div class="row">
                <label>Mikrofon Auswahl:<br><small>Wird beim nächsten Start der Überwachung angewendet.</small></label>
                <select id="mic_index" style="width: 100%; padding: 10px; border: 1px solid #444; border-radius: 5px; background: #1a1a1a; color: #fff; box-sizing: border-box;">
                    <option value="-1" {% if s.get('mic_index', -1)|int == -1 %}selected{% endif %}>Standard-Mikrofon</option>
                    {% for mic in mics %}
                    <option value="{{ mic.index }}" {% if s.get('mic_index', -1)|int == mic.index %}selected{% endif %}>{{ mic.name }} (Index {{ mic.index }})</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="section">
            <h2>Steuerung & Datenbank</h2>
            <div class="control-row">
                <button class="btn btn-green" onclick="startMonitor()">Mikrofon Starten</button>
                <button class="btn btn-red" onclick="stopMonitor()">Stoppen</button>
                <button class="btn btn-orange" onclick="dbSync()">Datenbank sortieren</button>
                <button class="btn btn-blue" onclick="dbBackup()">DB Backup erstellen</button>
                <button class="btn btn-red" disabled style="opacity: 0.5; cursor: not-allowed;" onclick="dbReset()">DB Reset (Alles löschen)</button>
                <a href="/manual_entry" class="btn btn-blue" style="text-decoration: none;">➕ Manueller Eintrag</a>
                <a href="/delete_entry" class="btn btn-blue" style="text-decoration: none;">✏️ Eintrag bearbeiten/löschen</a>
            </div>
        </div>

        <div class="section">
            <h2>Erkennungs-Einstellungen</h2>
            <label>Mindest-Konfidenz (Threshold %):<br><small>Ab wie viel Prozent Sicherheit soll ein Vogel gespeichert werden?</small></label>
            <input type="number" id="threshold" value="{{ s.get('threshold', 30) }}" min="0" max="100">
        </div>

        <div class="row">
            <label>GPS Breitengrad (Latitude):<br><small>Relevant für lokale Vogelarten-Filterung durch BirdNET</small></label>
            <input type="number" id="gps_lat" value="{{ s.get('gps_lat', 51.165691) }}" step="0.000001">
        </div>

        <div class="row">
            <label>GPS Längengrad (Longitude):</label>
            <input type="number" id="gps_lon" value="{{ s.get('gps_lon', 10.451526) }}" step="0.000001">
        </div>

        <div class="row">
            <label>Radar Distanz Multiplikator:<br><small>Verschiebt erkannte Vögel weiter nach außen (z.B. 1.0 = Standard, 1.5 = weiter außen)</small></label>
            <input type="number" id="radar_zoom" value="{{ s.get('radar_zoom', 1.0) }}" step="0.1" min="0.1" max="5.0">
        </div>

        <div class="row">
            <label>Radar maximale Vogelarten:<br><small>Wie viele unterschiedliche Vogelarten sollen gleichzeitig maximal auf dem Radar erscheinen?</small></label>
            <input type="number" id="radar_max_birds" value="{{ s.get('radar_max_birds', 10) }}" step="1" min="1" max="30">
        </div>

        <div class="row">
            <label>Radar Zeitrahmen (Stunden):<br><small>Zeige Vögel der letzten X Stunden auf dem Radar (1-24h).</small></label>
            <input type="number" id="radar_time_range" value="{{ s.get('radar_time_range', 24) }}" step="1" min="1" max="24">
        </div>

        <div class="row">
            <label>Radar Max SNR (dB):<br><small>Ab welchem SNR soll ein Vogel am nächsten zur Mitte angezeigt werden?</small></label>
            <input type="number" id="radar_snr_max" value="{{ s.get('radar_snr_max', 20.0) }}" step="0.5" min="0">
        </div>

        <div class="row">
            <label>Radar Min SNR (dB):<br><small>Ab welchem SNR soll ein Vogel ganz am Rand angezeigt werden?</small></label>
            <input type="number" id="radar_snr_min" value="{{ s.get('radar_snr_min', 5.0) }}" step="0.5" min="0">
        </div>
        </div>

        <button type="button" class="btn" style="width: 200px; display: block; margin: 30px auto;" onclick="saveSettings()">Speichern</button>
    </div>

    <script>
        function updateStatusAndLogs() {
            // Status
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    const statusEl = document.getElementById('sys-status');
                    if (statusEl) {
                        statusEl.innerText = data.status;
                        document.getElementById('today-count').innerText = data.today_detections;
                        document.getElementById('total-count').innerText = data.total_detections;
                    }
                });

            // Logs
            fetch('/api/latest_logs')
                .then(r => r.json())
                .then(logs => {
                    const box = document.getElementById('log-box');
                    if (box) box.innerHTML = logs.join('<br>');
                });
        }
        
        setInterval(updateStatusAndLogs, 3000);
        updateStatusAndLogs();

        // Audio Meter
        setInterval(() => {
            fetch('/api/audio_level')
                .then(r => r.json())
                .then(data => {
                    if (data.level !== undefined) {
                        let pct = (data.level / 10000) * 100;
                        if (pct > 100) pct = 100;
                        
                        let bar = document.getElementById('audio-meter');
                        if (bar) {
                            bar.style.width = pct + '%';
                            
                            if (pct < 50) {
                                bar.style.backgroundColor = '#4CAF50';
                            } else if (pct < 85) {
                                bar.style.backgroundColor = '#FFC107';
                            } else {
                                bar.style.backgroundColor = '#F44336';
                            }
                        }
                    }
                });
        }, 100);

        function startMonitor() {
            fetch('/api/control/start', { method: 'POST' })
                .then(r => r.json())
                .then(d => { if (d.error) alert(d.error); else alert(d.msg); });
        }

        function stopMonitor() {
            fetch('/api/control/stop', { method: 'POST' })
                .then(r => r.json())
                .then(d => alert(d.msg));
        }

        function dbSync() {
            if (confirm("Möchtest du wirklich die Datenbank zeitlich neu sortieren?")) {
                fetch('/api/control/dbsync', { method: 'POST' }).then(r => r.json()).then(d => alert(d.msg));
            }
        }

        function dbBackup() {
            fetch('/api/control/dbbackup', { method: 'POST' }).then(r => r.json()).then(d => alert(d.msg));
        }

        function dbReset() {
            if (confirm("Wirklich ALLES löschen? Die gesamte Datenbank wird geleert!")) {
                fetch('/api/control/dbreset', { method: 'POST' }).then(r => r.json()).then(d => alert(d.msg));
            }
        }

        function saveSettings() {
            const data = {
                threshold: parseInt(document.getElementById('threshold').value),
                gps_lat: parseFloat(document.getElementById('gps_lat').value),
                gps_lon: parseFloat(document.getElementById('gps_lon').value),
                radar_zoom: parseFloat(document.getElementById('radar_zoom').value),
                radar_max_birds: parseInt(document.getElementById('radar_max_birds').value),
                radar_time_range: parseInt(document.getElementById('radar_time_range').value),
                radar_snr_max: parseFloat(document.getElementById('radar_snr_max').value),
                radar_snr_min: parseFloat(document.getElementById('radar_snr_min').value),
                mic_index: parseInt(document.getElementById('mic_index').value)
            };

            fetch('/api/settings/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                alert(data.msg);
                window.location.href = '/';
            })
            .catch(err => alert("Fehler beim Speichern: " + err));
        }
    </script>
</body>
</html>
